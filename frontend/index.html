<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Calculate and reduce your personal carbon footprint with AI-powered personalised insights from Google Gemini. Compare to global averages and Paris climate targets."
    />
    <meta name="theme-color" content="#16a34a" />
    <meta name="color-scheme" content="light" />
    <!-- Open Graph -->
    <meta property="og:title" content="Carbon Footprint Awareness Platform" />
    <meta
      property="og:description"
      content="Understand, track, and reduce your personal carbon impact with AI-powered insights."
    />
    <meta property="og:type" content="website" />
    <!-- Preconnect for Google Fonts performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Carbon Footprint Awareness Platform</title>
  </head>
  <body>
    <!-- Skip navigation link (visually hidden until focused) -->
    <a
      href="#main-content"
      style="
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      "
      onfocus="this.style.cssText='position:absolute;top:1rem;left:1rem;z-index:9999;background:#15803d;color:white;padding:0.5rem 1rem;border-radius:0.5rem;text-decoration:none;font-family:Inter,sans-serif;'"
      onblur="this.style.cssText='position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;'"
    >
      Skip to main content
    </a>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
